difficulty: low
instruction: >
  A temporary April Fools API decorator was left on FastAPI instances. Remove
  that public decorator and its dedicated behavior without affecting normal
  HTTP and websocket route registration.
setup:
  - uv run --with-editable . --with httpx python -c "import fastapi"
public_tests:
  - uv run --with-editable . --with httpx python -c "from fastapi import FastAPI; assert not hasattr(FastAPI(), 'vibe')"
test_strategy:
  core_tests:
    - benchmark/cases/fastapi__fastapi/hidden-tests/low/core.sh
  regression_tests:
    - benchmark/cases/fastapi__fastapi/hidden-tests/low/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Low-difficulty public API cleanup. Hidden tests assert the temporary
  decorator is gone while ordinary route decorators continue to work.
