difficulty: high
instruction: >
  FastAPI responses with a Pydantic return type or response model still go
  through the slower Python json.dumps path when the default response class is
  used. Reproduce response serialization for Pydantic models and use the direct
  Pydantic JSON bytes path only when no explicit response class overrides it.
setup:
  - uv run --with-editable . --with httpx python -c "import fastapi"
public_tests:
  - uv run --with-editable . --with httpx pytest tests/test_dump_json_fast_path.py -q
hidden_tests:
  - benchmark/cases/fastapi__fastapi/hidden-tests/high/run.sh
test_strategy:
  core_tests:
    - benchmark/cases/fastapi__fastapi/hidden-tests/high/run.sh
  oracle_suites: []
  regression_tests: []
  success_rule: core_tests_pass
selection_notes: >
  Higher-difficulty routing/serialization behavior with a performance-sensitive
  fast path. Hidden test verifies both the optimized default path and the
  explicit JSONResponse fallback.
