difficulty: high
instruction: >
  lfx run can crash or return empty output when stream=true because streaming
  model output is persisted without a session/event manager to drain chunks.
  Reproduce the streaming handler path and fall back to a normal ainvoke result
  when lfx lacks the runtime context required for token streaming.
setup:
  - uv run --package lfx python -c "import lfx"
public_tests:
  - uv run --package lfx python -c "from lfx.base.models.model import LCModelComponent"
hidden_tests:
  - benchmark/cases/langflow-ai__langflow/hidden-tests/high/run.sh
