  oracle_suites: []
  regression_tests: []
  success_rule: core_tests_pass
selection_notes: >
  Higher-difficulty runtime bug in streaming model handling for CLI execution.
  Hidden test exercises the async handler with missing event-manager context and
  verifies it returns plain text without persisting an unconsumed stream.
