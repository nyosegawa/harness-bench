difficulty: low
instruction: >
  Custom components that log through Loguru do not write to Langflow's
  configured log file. Reproduce logging with a configured file target and
  route Loguru messages through the Langflow logger without duplicating stale
  file handlers.
setup:
  - uv run --package lfx python -c "import lfx"
public_tests:
  - uv run --package lfx python -c "from lfx.log.logger import configure"
test_strategy:
  core_tests:
    - benchmark/cases/langflow-ai__langflow/hidden-tests/low/core.sh
  regression_tests:
    - benchmark/cases/langflow-ai__langflow/hidden-tests/low/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Focused logging integration bug. Hidden test configures a temporary log file
  and verifies Loguru output reaches the same sink as Langflow logs.
