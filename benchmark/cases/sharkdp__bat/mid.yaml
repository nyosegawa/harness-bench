difficulty: mid
instruction: >
  When binary content is intentionally rendered as text, lines containing
  control characters wrap incorrectly. Reproduce the wrapping problem with
  a narrow terminal width and fix the displayed-width calculation so the
  rendered output wraps at the expected column.
setup:
  - cargo fetch
public_tests:
  - cargo test --test integration_tests
test_strategy:
  core_tests:
    - benchmark/cases/sharkdp__bat/hidden-tests/mid/core.sh
  regression_tests:
    - benchmark/cases/sharkdp__bat/hidden-tests/mid/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Terminal rendering bug that requires understanding how non-printable
  characters affect display width. The hidden test checks observable CLI
  wrapping behavior instead of the internal helper used by the PR.
