fixed_commit: b4f79851dba1337e72b6b2f0180239c9d59d4f8f
difficulty: high
instruction: >
  Loading divergence from configured base branches is too slow in repositories
  with many local branches because each branch triggers separate Git commands.
  Reproduce branch behind-base calculation and use Git's ahead-behind ref
  formatting when available, while preserving the legacy behavior on older Git
  versions and clearing stale values for branches omitted from fresh output.
setup:
  - go mod download
public_tests:
  - go test ./pkg/commands/git_commands -run TestGetBehindBaseBranchValuesForAllBranches
hidden_tests:
  - benchmark/cases/jesseduffield__lazygit/hidden-tests/high/run.sh
test_strategy:
  core_tests:
    - benchmark/cases/jesseduffield__lazygit/hidden-tests/high/run.sh
  regression_tests:
    - benchmark/cases/jesseduffield__lazygit/hidden-tests/high/run.sh
  success_rule: core_and_regression
selection_notes: >
  Higher-difficulty performance bug requiring knowledge of Git version-gated
  ahead/behind formatting, multiple base branches, parser robustness, and stale
  branch state handling.
