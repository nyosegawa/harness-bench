difficulty: mid
instruction: >
  When a commit message is remembered and restored, whitespace in the body is
  not preserved correctly. Reproduce the commit-message round trip and fix the
  message/description handling so intentional blank lines and indentation are
  kept, while co-author trailers are still appended cleanly.
