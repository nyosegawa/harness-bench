difficulty: low
instruction: >
  GitHub pull request integration fails to associate a local branch with its
  pull request when the repository owner casing differs between the PR API
  response and the configured remote URL. Reproduce the mismatch and make PR
  lookup handle owner casing consistently without changing branch-name matching.
setup:
  - go mod download
public_tests:
  - go test ./pkg/commands/git_commands -run TestGenerateGithubPullRequestMap
test_strategy:
  core_tests:
    - benchmark/cases/jesseduffield__lazygit/hidden-tests/low/core.sh
  regression_tests:
    - benchmark/cases/jesseduffield__lazygit/hidden-tests/low/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Small Go logic bug with a focused unit-level behavior. The original PR added
  a regression test and changed only GitHub owner normalization.
