difficulty: high
instruction: >
  Node HTTP requests with maxRedirects set to 0 do not honor the configured
  timeout while the TCP connection is still pending. Reproduce the hanging
  connect phase and make timeout handling abort the request consistently without
  changing timeout: 0 behavior.
setup:
  - npm install
public_tests:
  - npm run test:vitest:unit -- tests/unit/adapters/http.test.js
test_strategy:
  core_tests:
    - benchmark/cases/axios__axios/hidden-tests/high/core.sh
  regression_tests:
    - benchmark/cases/axios__axios/hidden-tests/high/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Higher-difficulty networking lifecycle bug involving native ClientRequest
  timeout semantics, abort handling, and maxRedirects transport selection.
