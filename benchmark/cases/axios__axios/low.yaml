difficulty: low
instruction: >
  Custom validateStatus callbacks can reject statuses outside the normal 4xx
  and 5xx ranges, and AxiosError.code becomes undefined. Reproduce the settle
  behavior and ensure rejected responses always receive a defined bad-request or
  bad-response error code.
