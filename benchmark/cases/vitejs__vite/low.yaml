instruction: >
  Optimized dependency file IDs can collide or lose information when package
  IDs contain characters that are later sanitized for URL paths. Reproduce the
  flattening edge case and make flattened IDs encode sanitized characters
  without colliding with underscores or nested IDs.
setup:
  - pnpm install --ignore-scripts
  - pnpm --filter=./packages/vite run build-bundle
public_tests:
  - pnpm vitest run packages/vite/src/node/__tests__/utils.spec.ts -t flattenId
hidden_tests:
