instruction: >
  Vite does not detect a Deno workspace root when a project is nested under a
  directory with a deno.json workspace declaration. Reproduce workspace root
  discovery for nested Deno workspaces and keep existing package-manager root
  detection behavior intact.
setup:
  - pnpm install --ignore-scripts
  - pnpm --filter=./packages/vite run build-bundle
public_tests:
  - pnpm vitest run packages/vite/src/node/server/__tests__/search-root.spec.ts
test_strategy:
  core_tests:
    - benchmark/cases/vitejs__vite/hidden-tests/mid/core.sh
  regression_tests:
    - benchmark/cases/vitejs__vite/hidden-tests/mid/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Mid-difficulty root-search bug requiring filesystem fixture behavior and
  support for Deno workspace manifests alongside existing package manager
  workspace detection.
