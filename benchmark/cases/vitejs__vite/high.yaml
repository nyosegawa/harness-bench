difficulty: high
instruction: >
  In bundled dev mode, generated HMR patch files can be served as plain script
  content. Reproduce the patch generation behavior and make HMR patch responses
  contain ESM syntax so they cannot be consumed as classic cross-origin
  scripts, without breaking normal update notifications.
setup:
  - pnpm install --ignore-scripts
  - pnpm --filter=./packages/vite run build-bundle
public_tests:
  - pnpm vitest run packages/vite/src/node/server/__tests__
hidden_tests:
  - benchmark/cases/vitejs__vite/hidden-tests/high/run.sh
test_strategy:
  core_tests:
    - benchmark/cases/vitejs__vite/hidden-tests/high/run.sh
  oracle_suites: []
  regression_tests: []
  success_rule: core_tests_pass
selection_notes: >
  Higher-difficulty bundled-dev HMR behavior touching dev-server internals and
  security semantics. Hidden tests exercise patch-memory output directly while
  avoiding browser e2e flakiness.
