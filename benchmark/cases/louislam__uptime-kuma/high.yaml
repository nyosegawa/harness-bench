difficulty: high
instruction: >
  WebSocket monitors ignore custom headers and authentication options during
  the upgrade handshake. Reproduce option construction for websocket checks and
  support headers, basic auth, OAuth client credentials, mTLS, and handshake
  timeouts without breaking existing status-code behavior. Expose the option
  construction through a reusable websocket options helper on the monitor type
  so it can be tested without opening a network connection; authentication
  headers must take precedence over stale custom Authorization headers.
setup:
  - npm ci --omit=dev --ignore-scripts --no-audit
public_tests:
  - node --test --test-reporter=spec test/backend-test/monitors/test-websocket.js
test_strategy:
  core_tests:
    - benchmark/cases/louislam__uptime-kuma/hidden-tests/high/core.sh
  regression_tests:
    - benchmark/cases/louislam__uptime-kuma/hidden-tests/high/regression.sh
  success_rule: core_and_regression
selection_notes: >
  Higher-difficulty monitor behavior spanning websocket handshake options and
  authentication precedence. Hidden tests check options directly to avoid
  flaky network timing.
