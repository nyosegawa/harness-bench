instruction: >
  Uptime cleanup lookups can create missing historical buckets, which shifts
  the rolling data window and makes longer-period uptime views show too little
  recent data. Reproduce the missing-bucket side effect and prevent cleanup
  lookups from mutating minutely, hourly, or daily uptime queues.
